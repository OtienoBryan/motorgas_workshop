<!DOCTYPE html>
<html>
<head>
    <title>Test Countries API</title>
</head>
<body>
    <h1>Test Countries API</h1>
    <button onclick="testCountries()">Test Countries API</button>
    <div id="result"></div>

    <script>
        async function testCountries() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test without authentication
                console.log('Testing without authentication...');
                const response1 = await fetch('/api/countries');
                console.log('Response 1 status:', response1.status);
                
                if (response1.ok) {
                    const data1 = await response1.json();
                    console.log('Data 1:', data1);
                    resultDiv.innerHTML = '<h3>Without Auth:</h3><pre>' + JSON.stringify(data1, null, 2) + '</pre>';
                } else {
                    const error1 = await response1.text();
                    console.log('Error 1:', error1);
                    resultDiv.innerHTML = '<h3>Without Auth Error:</h3><p>' + error1 + '</p>';
                }
                
                // Test with mock token
                console.log('Testing with mock token...');
                const response2 = await fetch('/api/countries', {
                    headers: {
                        'Authorization': 'Bearer test-token',
                        'Content-Type': 'application/json'
                    }
                });
                console.log('Response 2 status:', response2.status);
                
                if (response2.ok) {
                    const data2 = await response2.json();
                    console.log('Data 2:', data2);
                    resultDiv.innerHTML += '<h3>With Mock Token:</h3><pre>' + JSON.stringify(data2, null, 2) + '</pre>';
                } else {
                    const error2 = await response2.text();
                    console.log('Error 2:', error2);
                    resultDiv.innerHTML += '<h3>With Mock Token Error:</h3><p>' + error2 + '</p>';
                }
                
            } catch (error) {
                console.error('Test failed:', error);
                resultDiv.innerHTML = '<h3>Test Failed:</h3><p>' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
